name: Cloudflare Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Deploy D1 migrations, Worker API, and Pages dashboard
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          npx wrangler d1 migrations apply recipe-book-online-2026 --remote
          npx wrangler deploy
          npx wrangler pages deploy docs --project-name recipe-book-bot-advanced-python-2026
