<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Book Control Panel</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/styles.css">
  <script defer src="assets/app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">RB</div>
        <div>
          <p class="eyebrow">Cloudflare D1 + Telegram Bot</p>
          <h1>Recipe Book Control Panel</h1>
          <p class="subtitle">Онлайн-каталог, избранное, рейтинг, CRUD и аналитика рецептов.</p>
        </div>
      </div>
      <div class="topbar-actions">
        <a class="outline-link" href="https://recipe-book-online-api-2026.egory780.workers.dev/" target="_blank" rel="noreferrer">API</a>
        <a class="outline-link" href="https://t.me/s6361bot" target="_blank" rel="noreferrer">Telegram</a>
        <div class="status" id="connectionStatus">Подключение...</div>
      </div>
    </header>

    <section class="metric-grid" aria-label="Сводка проекта">
      <div class="metric-card" data-tone="green">
        <span id="statRecipes">0</span>
        <small>рецептов в D1</small>
      </div>
      <div class="metric-card" data-tone="slate">
        <span id="statUsers">0</span>
        <small>пользователей</small>
      </div>
      <div class="metric-card" data-tone="blue">
        <span id="statCategories">0</span>
        <small>категорий</small>
      </div>
      <div class="metric-card" data-tone="amber">
        <span id="statIngredients">0</span>
        <small>ингредиентов</small>
      </div>
      <div class="metric-card" data-tone="red">
        <span id="statFavorites">0</span>
        <small>избранных</small>
      </div>
      <div class="metric-card" data-tone="slate">
        <span id="statRatings">0</span>
        <small>оценок</small>
      </div>
    </section>

    <section class="dashboard-grid">
      <aside class="filters-panel" aria-label="Фильтры каталога">
        <div class="panel-head">
          <h2>Навигация</h2>
          <button id="refreshButton" class="icon-button" type="button" title="Обновить данные">Обновить</button>
        </div>

        <label class="field">Поиск
          <input id="searchInput" type="search" placeholder="Название, описание, категория" autocomplete="off">
        </label>

        <div class="segment-control" role="tablist" aria-label="Режим просмотра">
          <button id="modeCatalog" class="segment active" type="button" data-mode="catalog">Каталог</button>
          <button id="modeFavorites" class="segment" type="button" data-mode="favorites">Избранное</button>
          <button id="modeAnalytics" class="segment" type="button" data-mode="analytics">Аналитика</button>
        </div>

        <div class="user-panel" aria-label="Активный пользователь">
          <div class="filter-title">Пользователь</div>
          <label class="field">Активный профиль
            <select id="userSelect"></select>
          </label>
          <div class="user-form-grid">
            <label class="field">Telegram ID
              <input id="userTelegramInput" type="number" min="1" step="1" inputmode="numeric" placeholder="1001">
            </label>
            <label class="field">Имя
              <input id="userNameInput" maxlength="160" placeholder="Имя пользователя">
            </label>
          </div>
          <label class="field">Username
            <input id="userUsernameInput" maxlength="80" placeholder="username без @">
          </label>
          <button id="saveUserButton" class="secondary-button wide" type="button">Сохранить пользователя</button>
        </div>

        <div class="filter-group">
          <div class="filter-title">Категории</div>
          <div class="category-list" id="categoryFilters"></div>
        </div>

        <div class="filter-grid">
          <label class="field">Сложность
            <select id="difficultyFilter">
              <option value="">Любая</option>
            </select>
          </label>
          <label class="field">Время
            <select id="timeFilter">
              <option value="">Любое</option>
              <option value="15">до 15 мин</option>
              <option value="30">до 30 мин</option>
              <option value="45">до 45 мин</option>
              <option value="60">до 60 мин</option>
            </select>
          </label>
          <label class="field">Сортировка
            <select id="sortSelect">
              <option value="title">по названию</option>
              <option value="category">по категории</option>
              <option value="minutes">по времени</option>
              <option value="rating">по рейтингу</option>
              <option value="favoriteCount">по избранному</option>
              <option value="myRating">по моей оценке</option>
              <option value="created">новые выше</option>
            </select>
          </label>
        </div>

        <button id="newButton" class="primary-button wide" type="button">Новый рецепт</button>
      </aside>

      <section class="content-panel" aria-label="Рабочая область">
        <div class="content-head">
          <div>
            <p class="eyebrow" id="modeEyebrow">Каталог</p>
            <h2 id="workspaceTitle">Все рецепты</h2>
          </div>
          <div class="result-pill" id="resultCount">0 из 0</div>
        </div>

        <div class="insight-grid" id="insightGrid"></div>
        <div class="recipe-grid" id="recipeList"></div>
        <button id="loadMoreButton" class="secondary-button wide load-more" type="button" hidden>Показать еще</button>
        <div class="analytics-view" id="analyticsView" hidden></div>
      </section>

      <aside class="detail-panel" aria-label="Рецепт и редактор">
        <div class="detail-tabs" role="tablist" aria-label="Карточка или редактор">
          <button id="detailTabButton" class="segment active" type="button" data-detail-tab="detail">Карточка</button>
          <button id="editorTabButton" class="segment" type="button" data-detail-tab="editor">Редактор</button>
        </div>

        <section id="recipeDetail" class="detail-view"></section>

        <form id="recipeForm" class="editor" hidden>
          <input type="hidden" id="recipeId">
          <div class="form-grid">
            <label class="field">Название<input id="titleInput" required maxlength="140"></label>
            <label class="field">Категория<input id="categoryInput" list="categoryOptions" required maxlength="80"></label>
            <label class="field">Время, мин.<input id="minutesInput" type="number" required min="1" value="20"></label>
            <label class="field">Сложность<input id="difficultyInput" required maxlength="40" value="простая"></label>
          </div>
          <datalist id="categoryOptions"></datalist>
          <label class="field">Описание<textarea id="descriptionInput" required rows="3"></textarea></label>
          <label class="field">Инструкция<textarea id="instructionsInput" required rows="6"></textarea></label>
          <label class="field">Ингредиенты<textarea id="ingredientsInput" required rows="6" placeholder="яйца | 3 | шт | по желанию"></textarea></label>
          <div class="editor-actions">
            <button id="saveButton" class="primary-button" type="submit">Сохранить</button>
            <button id="deleteButton" class="danger-button" type="button">Удалить</button>
          </div>
        </form>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
