<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Book Control Panel</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/styles.css">
  <script defer src="assets/app.js"></script>
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-api" viewBox="0 0 24 24">
      <path d="M4 5h16v6H4V5Z"></path>
      <path d="M4 13h16v6H4v-6Z"></path>
      <circle cx="8" cy="8" r=".7"></circle>
      <circle cx="8" cy="16" r=".7"></circle>
    </symbol>
    <symbol id="icon-telegram" viewBox="0 0 24 24">
      <path d="M21 4 3 11l7 3 3 7 8-17Z"></path>
      <path d="m10 14 5-5"></path>
    </symbol>
    <symbol id="icon-refresh" viewBox="0 0 24 24">
      <path d="M20 11a8 8 0 0 0-14-5l-2 2"></path>
      <path d="M4 4v4h4"></path>
      <path d="M4 13a8 8 0 0 0 14 5l2-2"></path>
      <path d="M20 20v-4h-4"></path>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
      <path d="M4 5a3 3 0 0 1 3-3h13v18H7a3 3 0 0 0-3 3V5Z"></path>
      <path d="M4 19a3 3 0 0 1 3-3h13"></path>
    </symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24">
      <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8Z"></path>
    </symbol>
    <symbol id="icon-chart" viewBox="0 0 24 24">
      <path d="M4 19V5"></path>
      <path d="M4 19h16"></path>
      <path d="M8 16v-5"></path>
      <path d="M12 16V8"></path>
      <path d="M16 16v-7"></path>
    </symbol>
    <symbol id="icon-user" viewBox="0 0 24 24">
      <path d="M20 21a8 8 0 0 0-16 0"></path>
      <circle cx="12" cy="8" r="4"></circle>
    </symbol>
    <symbol id="icon-save" viewBox="0 0 24 24">
      <path d="M5 3h12l2 2v16H5V3Z"></path>
      <path d="M8 3v6h8V3"></path>
      <path d="M8 21v-7h8v7"></path>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14"></path>
      <path d="M5 12h14"></path>
    </symbol>
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8-5.4 2.8 1-6-4.4-4.3 6.1-.9L12 3Z"></path>
    </symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24">
      <path d="M12 20h9"></path>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M3 6h18"></path>
      <path d="M8 6V4h8v2"></path>
      <path d="M19 6l-1 14H6L5 6"></path>
    </symbol>
  </svg>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">RB</div>
        <div>
          <p class="eyebrow">Cloudflare D1 + Telegram Bot</p>
          <h1>Recipe Book Control Panel</h1>
          <p class="subtitle">Каталог, пользователи, оценки и статистика рецептов.</p>
        </div>
      </div>
      <div class="topbar-actions">
        <a class="outline-link compact-link" href="https://recipe-book-online-api-2026.egory780.workers.dev/" target="_blank" rel="noreferrer" aria-label="Открыть API" title="API">
          <svg class="icon"><use href="#icon-api"></use></svg>
          <span>API</span>
        </a>
        <a class="outline-link compact-link" href="https://t.me/s6361bot" target="_blank" rel="noreferrer" aria-label="Открыть Telegram bot" title="Telegram bot">
          <svg class="icon"><use href="#icon-telegram"></use></svg>
          <span>Bot</span>
        </a>
        <div class="status" id="connectionStatus">Подключение...</div>
      </div>
    </header>

    <section class="metric-grid" aria-label="Сводка проекта">
      <div class="metric-card" data-tone="green">
        <span id="statRecipes">0</span>
        <small>рецепты</small>
      </div>
      <div class="metric-card" data-tone="slate">
        <span id="statUsers">0</span>
        <small>люди</small>
      </div>
      <div class="metric-card" data-tone="blue">
        <span id="statCategories">0</span>
        <small>категорий</small>
      </div>
      <div class="metric-card" data-tone="amber">
        <span id="statIngredients">0</span>
        <small>ингр.</small>
      </div>
      <div class="metric-card" data-tone="red">
        <span id="statFavorites">0</span>
        <small>избранных</small>
      </div>
      <div class="metric-card" data-tone="slate">
        <span id="statRatings">0</span>
        <small>оценок</small>
      </div>
    </section>

    <section class="dashboard-grid">
      <aside class="filters-panel" aria-label="Фильтры каталога">
        <div class="panel-head">
          <h2>Фильтры</h2>
          <button id="refreshButton" class="icon-button" type="button" title="Обновить данные" aria-label="Обновить данные">
            <svg class="icon"><use href="#icon-refresh"></use></svg>
          </button>
        </div>

        <label class="field">Поиск
          <input id="searchInput" type="search" placeholder="Название или категория" autocomplete="off">
        </label>

        <div class="segment-control" role="tablist" aria-label="Режим просмотра">
          <button id="modeCatalog" class="segment active" type="button" data-mode="catalog" title="Каталог" aria-label="Каталог">
            <svg class="icon"><use href="#icon-book"></use></svg>
            <span>Каталог</span>
          </button>
          <button id="modeFavorites" class="segment" type="button" data-mode="favorites" title="Мое избранное" aria-label="Мое избранное">
            <svg class="icon"><use href="#icon-heart"></use></svg>
            <span>Мои</span>
          </button>
          <button id="modeAnalytics" class="segment" type="button" data-mode="analytics" title="Статистика" aria-label="Статистика">
            <svg class="icon"><use href="#icon-chart"></use></svg>
            <span>Стат.</span>
          </button>
        </div>

        <div class="user-panel" aria-label="Активный пользователь">
          <div class="filter-title">Профиль</div>
          <label class="field">Активный
            <select id="userSelect"></select>
          </label>
          <div class="user-form-grid">
            <label class="field">Telegram ID
              <input id="userTelegramInput" type="number" min="1" step="1" inputmode="numeric" placeholder="1001">
            </label>
            <label class="field">Имя
              <input id="userNameInput" maxlength="160" placeholder="Имя пользователя">
            </label>
          </div>
          <label class="field">Username
            <input id="userUsernameInput" maxlength="80" placeholder="username без @">
          </label>
          <button id="saveUserButton" class="secondary-button wide" type="button">
            <svg class="icon"><use href="#icon-save"></use></svg>
            <span>Сохранить</span>
          </button>
        </div>

        <div class="filter-group">
          <div class="filter-title">Категории</div>
          <div class="category-list" id="categoryFilters"></div>
        </div>

        <div class="filter-grid">
          <label class="field">Сложность
            <select id="difficultyFilter">
              <option value="">Любая</option>
            </select>
          </label>
          <label class="field">Время
            <select id="timeFilter">
              <option value="">Любое</option>
              <option value="15">до 15 мин</option>
              <option value="30">до 30 мин</option>
              <option value="45">до 45 мин</option>
              <option value="60">до 60 мин</option>
            </select>
          </label>
          <label class="field">Сортировка
            <select id="sortSelect">
              <option value="title">название</option>
              <option value="category">категория</option>
              <option value="minutes">время</option>
              <option value="rating">рейтинг</option>
              <option value="favoriteCount">избранное</option>
              <option value="myRating">моя оценка</option>
              <option value="created">новые</option>
            </select>
          </label>
        </div>

        <button id="newButton" class="primary-button wide" type="button">
          <svg class="icon"><use href="#icon-plus"></use></svg>
          <span>Новый рецепт</span>
        </button>
      </aside>

      <section class="content-panel" aria-label="Рабочая область">
        <div class="content-head">
          <div>
            <p class="eyebrow" id="modeEyebrow">Каталог</p>
            <h2 id="workspaceTitle">Все рецепты</h2>
          </div>
          <div class="result-pill" id="resultCount">0 из 0</div>
        </div>

        <div class="insight-grid" id="insightGrid"></div>
        <div class="recipe-grid" id="recipeList"></div>
        <button id="loadMoreButton" class="secondary-button wide load-more" type="button" hidden>
          <svg class="icon"><use href="#icon-plus"></use></svg>
          <span>Еще</span>
        </button>
        <div class="analytics-view" id="analyticsView" hidden></div>
      </section>

      <aside class="detail-panel" aria-label="Рецепт и редактор">
        <div class="detail-tabs" role="tablist" aria-label="Карточка или редактор">
          <button id="detailTabButton" class="segment active" type="button" data-detail-tab="detail">
            <svg class="icon"><use href="#icon-book"></use></svg>
            <span>Карточка</span>
          </button>
          <button id="editorTabButton" class="segment" type="button" data-detail-tab="editor">
            <svg class="icon"><use href="#icon-edit"></use></svg>
            <span>Редактор</span>
          </button>
        </div>

        <section id="recipeDetail" class="detail-view"></section>

        <form id="recipeForm" class="editor" hidden>
          <input type="hidden" id="recipeId">
          <div class="form-grid">
            <label class="field">Название<input id="titleInput" required maxlength="140"></label>
            <label class="field">Категория<input id="categoryInput" list="categoryOptions" required maxlength="80"></label>
            <label class="field">Время, мин.<input id="minutesInput" type="number" required min="1" value="20"></label>
            <label class="field">Сложность<input id="difficultyInput" required maxlength="40" value="простая"></label>
          </div>
          <datalist id="categoryOptions"></datalist>
          <label class="field">Описание<textarea id="descriptionInput" required rows="3"></textarea></label>
          <label class="field">Инструкция<textarea id="instructionsInput" required rows="6"></textarea></label>
          <label class="field">Ингредиенты<textarea id="ingredientsInput" required rows="6" placeholder="яйца | 3 | шт | по желанию"></textarea></label>
          <div class="editor-actions">
            <button id="saveButton" class="primary-button" type="submit">
              <svg class="icon"><use href="#icon-save"></use></svg>
              <span>Сохранить</span>
            </button>
            <button id="deleteButton" class="danger-button" type="button">
              <svg class="icon"><use href="#icon-trash"></use></svg>
              <span>Удалить</span>
            </button>
          </div>
        </form>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
